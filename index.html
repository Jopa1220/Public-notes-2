<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Notes</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 10px; }
        .box { border: 1px solid #fff; padding: 10px; margin-bottom: 10px; }
        input, button { background: #000; color: #fff; border: 1px solid #fff; padding: 8px; margin: 5px 0; width: 100%; box-sizing: border-box; }
        .hidden { display: none; }
        #canvas { height: 300px; overflow-y: scroll; border: 1px solid #fff; padding: 10px; margin: 10px 0; }
        .msg { margin-bottom: 8px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="auth-screen" class="box">
        <h3>PUBLIC NOTES</h3>
        <input type="text" id="login" placeholder="Username">
        <input type="password" id="pass" placeholder="Password">
        <button onclick="login()">Log In</button>
    </div>

    <div id="main-screen" class="hidden">
        <div id="canvas"></div>
        <input type="text" id="msg-input" placeholder="Type your message...">
        <button onclick="sendMessage()">Send</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfsFaXIiavE5KT7Sj6k_2Azbi4WDYo4QY",
            authDomain: "public-notes-8f5a8.firebaseapp.com",
            projectId: "public-notes-8f5a8",
            storageBucket: "public-notes-8f5a8.firebasestorage.app",
            messagingSenderId: "273187295628",
            appId: "1:273187295628:web:dd3f77238b7207aa6746a9",
            measurementId: "G-GBF1MZ7HWK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.login = () => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        };

        window.sendMessage = async () => {
            const input = document.getElementById('msg-input');
            if (!input.value) return;
            await addDoc(collection(db, "messages"), {
                text: input.value,
                timestamp: new Date()
            });
            input.value = '';
        };

        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const canvas = document.getElementById('canvas');
            canvas.innerHTML = ''; 
            snapshot.forEach((doc) => {
                const msg = doc.data();
                const div = document.createElement('div');
                div.className = 'msg';
                div.textContent = msg.text;
                canvas.appendChild(div);
            });
        });
    </script>
</body>
</html>
