‸<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Public Notes</title>
    <style>
        body { background: #000; color: #fff; font-family: 'Courier New', monospace; margin: 0; padding: 20px; }
        .box { border: 1px solid #fff; padding: 15px; margin: 10px 0; }
        input, button { background: #000; color: #fff; border: 1px solid #fff; padding: 10px; width: 100%; margin: 5px 0; box-sizing: border-box; }
        #canvas { height: 250px; border: 1px solid #fff; margin: 10px 0; overflow-y: scroll; padding: 10px; }
        .msg { margin-bottom: 8px; border-bottom: 1px solid #333; }
    </style>
</head>
<body>

    <div id="auth-screen" class="box">
        <h3>PUBLIC NOTES</h3>
        <input type="text" id="login" placeholder="Логин">
        <input type="password" id="pass" placeholder="Пароль">
        <button onclick="login()">Войти / Регистрация</button>
    </div>

    <div id="main-ui" class="hidden box">
        <div id="user-id-display" style="font-size: 0.8em; color: #888;"></div>
        <div id="current-group">Группа: Общая</div>
        <div id="canvas"></div>
        <input type="text" id="msg-input" placeholder="Введите сообщение...">
        <button onclick="sendMessage()">Send</button>
        
        <button onclick="createGroup()">+ Создать группу</button>
        <input type="text" id="group-id-input" placeholder="ID группы (16 симв)...">
        <button onclick="joinGroup()">Поиск группы</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCfsFaXIiav" + "E5KT7Sj6k_2Azbi4WDYo4QY",
            authDomain: "public-notes-8f5a8.firebaseapp.com",
            projectId: "public-notes-8f5a8",
            storageBucket: "public-notes-8f5a8.firebasestorage.app",
            messagingSenderId: "273187295628",
            appId: "1:273187295628:web:dd3f77238b7207aa6746a9",
            measurementId: "G-GBF1MZ7HWK"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        
        let currentGroup = "public"; // По умолчанию общая заметка
        let userId = localStorage.getItem('my_uid') || (Math.random().toString(36).substring(2,6) + "-" + Math.random().toString(36).substring(2,6) + "-" + Math.random().toString(36).substring(2,6)).toUpperCase();
        localStorage.setItem('my_uid', userId);
        document.getElementById('user-id-display').innerText = "ID: " + userId;

        window.login = () => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
        };

        window.createGroup = () => {
            // Генерация 16-символьного ID (XXXX-XXXX-XXXX-XXXX)
            const s = () => Math.random().toString(36).substring(2,6).toUpperCase();
            const gid = `${s()}-${s()}-${s()}-${s()}`;
            alert("Группа создана! ID: " + gid);
            currentGroup = gid;
            document.getElementById('current-group').innerText = "Группа: " + gid;
            loadMessages();
        };

        window.joinGroup = () => {
            const gid = document.getElementById('group-id-input').value;
            if(gid.length < 16) return alert("Неверный ID");
            currentGroup = gid;
            document.getElementById('current-group').innerText = "Группа: " + gid;
            loadMessages();
        };

        window.sendMessage = async () => {
            const input = document.getElementById('msg-input');
            if (!input.value) return;
            await addDoc(collection(db, "messages"), { 
                text: input.value, 
                sender: userId,
                groupId: currentGroup,
                timestamp: new Date() 
            });
            input.value = '';
        };

        function loadMessages() {
            const q = query(collection(db, "messages"), where("groupId", "==", currentGroup), orderBy("timestamp", "asc"));
            onSnapshot(q, (snapshot) => {
                const canvas = document.getElementById('canvas');
                canvas.innerHTML = ''; 
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const div = document.createElement('div');
                    div.className = 'msg';
                    div.textContent = `id${data.sender}: ${data.text}`;
                    canvas.appendChild(div);
                });
            });
        }

        loadMessages(); // Загрузить при старте
    </script>
</body>
</html>
